plugins {
    id 'java-library'
}

description = 'Kafka implementation for messaging abstraction layer'

repositories {
    mavenCentral()
    maven {
        url "https://packages.confluent.io/maven/"
    }
}

dependencies {
    api project(':messaging-api')
    
    // Kafka Client
    implementation "org.apache.kafka:kafka-clients:${kafkaVersion}"
    
    // Schema Registry Client (Confluent)
    implementation "io.confluent:kafka-avro-serializer:7.8.0"
    implementation "io.confluent:kafka-schema-registry-client:7.8.0"
    
    // AVRO
    implementation "org.apache.avro:avro:${avroVersion}"
    
    // Logging
    implementation "org.slf4j:slf4j-api:${slf4jVersion}"
    
    // Testing
    testImplementation "org.junit.jupiter:junit-jupiter-api:${junitJupiterVersion}"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${junitJupiterVersion}"
    testImplementation "org.testcontainers:kafka:${testContainersVersion}"
    testImplementation "org.apache.kafka:kafka_2.13:${kafkaVersion}"
}

test {
    useJUnitPlatform()
}

